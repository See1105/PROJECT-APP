{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Log In - AI Study Buddy{% endblock %}

{% block content %}
<div class="row justify-content-center min-vh-100 align-items-center">
    <div class="col-md-5">
        <div class="glass-card text-center mb-5">
            <svg class="mb-4" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#818cf8" />
                        <stop offset="100%" stop-color="#c084fc" />
                    </linearGradient>
                </defs>
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
            </svg>

            <h2 class="fw-bold mb-2">Welcome Back</h2>
            <p class="text-white-50 mb-4">Log in to continue your learning journey</p>

            <form method="post" class="text-start">
                {% csrf_token %}
                {{ form|crispy }}

                <div class="d-grid mt-4">
                    <button type="submit"
                        class="btn btn-primary py-3 rounded-pill gap-2 d-flex align-items-center justify-content-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="feather feather-log-in">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                        Log In
                    </button>
                </div>
            </form>

            <div class="mt-4 pt-3 border-top border-white-10">
                <p class="text-white-50 small mb-0">Don't have an account? <a href="{% url 'signup' %}"
                        class="text-white fw-bold text-decoration-none border-bottom border-primary">Sign up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
