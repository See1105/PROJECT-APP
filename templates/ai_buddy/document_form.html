{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Upload Document - AI Study Buddy{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-primary">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h2 class="fw-bold mb-2">Upload Study Guide</h2>
                <p class="text-white-50">Upload a PDF or Text file to get an instant AI summary.</p>
            </div>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary py-3 rounded-pill fw-bold">Process with AI</button>
                    <a href="{% url 'document_list' %}"
                        class="btn btn-link text-white-50 mt-2 text-decoration-none">Back to List</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
